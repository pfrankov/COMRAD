services:
  manager:
    build:
      context: .
    image: comrad-manager:local
    environment:
      COMRAD_MANAGER_ADDR: 0.0.0.0:8080
      COMRAD_STORAGE_MODE: auto
      COMRAD_DATABASE_URL: "postgres://comrad:${COMRAD_POSTGRES_PASSWORD:?set COMRAD_POSTGRES_PASSWORD}@postgres:5432/comrad?sslmode=disable"
      COMRAD_SQLITE_PATH: /var/lib/comrad/comrad.sqlite
      COMRAD_ARTIFACT_DIR: /var/lib/comrad/artifacts
      COMRAD_ADMIN_TOKEN: "${COMRAD_ADMIN_TOKEN:?set COMRAD_ADMIN_TOKEN}"
      COMRAD_CLIENT_API_KEY: "${COMRAD_CLIENT_API_KEY:?set COMRAD_CLIENT_API_KEY}"
      COMRAD_WORKER_TOKEN: "${COMRAD_WORKER_TOKEN:?set COMRAD_WORKER_TOKEN}"
      COMRAD_EXTERNAL_URL: "${COMRAD_EXTERNAL_URL:-}"
      COMRAD_AUTO_APPROVE_WORKERS: "${COMRAD_AUTO_APPROVE_WORKERS:-true}"
      COMRAD_ENFORCE_BALANCE: "${COMRAD_ENFORCE_BALANCE:-false}"
    ports:
      - "${COMRAD_MANAGER_PORT:-1922}:8080"
    volumes:
      - comrad-data:/var/lib/comrad
      - ./imports:/var/lib/comrad/imports:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/ready"]
      interval: 10s
      timeout: 3s
      retries: 6

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: comrad
      POSTGRES_USER: comrad
      POSTGRES_PASSWORD: "${COMRAD_POSTGRES_PASSWORD:?set COMRAD_POSTGRES_PASSWORD}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comrad -d comrad"]
      interval: 5s
      timeout: 3s
      retries: 12

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "${COMRAD_PROMETHEUS_PORT:-19090}:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      manager:
        condition: service_started

volumes:
  comrad-data:
  postgres-data:
  prometheus-data:
